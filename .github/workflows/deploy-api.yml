name: Deploy API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/db/**'
      - 'packages/shared-types/**'

concurrency:
  group: deploy-api
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wago/api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  migrate:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.DEPLOY_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Run migrations in-cluster
        run: |
          POD_NAME="migrate-$(echo ${{ github.sha }} | cut -c1-8)"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          DB_URL=$(kubectl get secret wago-api-secret -n default -o jsonpath='{.data.DATABASE_URL}' | base64 -d)

          kubectl run "$POD_NAME" \
            --image="$IMAGE" \
            --restart=Never \
            --namespace=default \
            --env="DATABASE_URL=$DB_URL" \
            --overrides='{"spec":{"imagePullSecrets":[{"name":"ghcr-secret"}]}}' \
            --command -- node packages/db/scripts/migrate.cjs

          # Wait for pod to finish (Running or Succeeded/Failed)
          kubectl wait --for=condition=Ready "pod/$POD_NAME" -n default --timeout=60s 2>/dev/null || true
          kubectl wait --for=jsonpath='{.status.phase}'=Succeeded "pod/$POD_NAME" -n default --timeout=120s 2>/dev/null || true

          # Stream logs
          kubectl logs "$POD_NAME" -n default || true

          # Check pod succeeded
          STATUS=$(kubectl get pod "$POD_NAME" -n default -o jsonpath='{.status.phase}')
          echo "Migration pod status: $STATUS"

          # Cleanup
          kubectl delete pod "$POD_NAME" -n default --ignore-not-found

          if [ "$STATUS" != "Succeeded" ]; then
            echo "Migration failed with status: $STATUS"
            exit 1
          fi

  deploy:
    needs: [build-and-push, migrate]
    runs-on: ubuntu-latest

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.DEPLOY_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Update API image and restart
        run: |
          kubectl set image deployment/wago-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --namespace default
          kubectl rollout status deployment/wago-api \
            --namespace default \
            --timeout=120s
