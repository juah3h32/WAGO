name: Release CLI

on:
  push:
    tags: ['cli-v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#cli-v}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w -X main.version=${VERSION}" -o "wago-${GOOS}-${GOARCH}${EXT}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wago-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/wago-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x artifacts/wago-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#cli-v}"

          # Calculate SHA256 for each platform
          SHA_DARWIN_ARM64=$(shasum -a 256 artifacts/wago-darwin-arm64 | cut -d' ' -f1)
          SHA_DARWIN_AMD64=$(shasum -a 256 artifacts/wago-darwin-amd64 | cut -d' ' -f1)
          SHA_LINUX_AMD64=$(shasum -a 256 artifacts/wago-linux-amd64 | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(shasum -a 256 artifacts/wago-linux-arm64 | cut -d' ' -f1)

          # Clone tap repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/juah3h32/homebrew-tap.git /tmp/tap
          cd /tmp/tap

          # Generate updated formula
          cat > Formula/wago.rb << FORMULA
          class Wahooks < Formula
            desc "CLI for Wago — manage WhatsApp connections, webhooks, and messaging"
            homepage "https://github.com/juah3h32/wago"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/juah3h32/wago/releases/download/cli-v#{version}/wago-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/juah3h32/wago/releases/download/cli-v#{version}/wago-darwin-amd64"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/juah3h32/wago/releases/download/cli-v#{version}/wago-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/juah3h32/wago/releases/download/cli-v#{version}/wago-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              binary = Dir["wago-*"].first || "wago"
              bin.install binary => "wago"
            end

            test do
              assert_match "Wago CLI", shell_output("#{bin}/wago --help")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/wago.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wago.rb
          git commit -m "Update wago to v${VERSION}" || echo "No changes"
          git push
